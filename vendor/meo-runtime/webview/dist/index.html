<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Editor Optimized</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .editor-root {
        width: 100%;
        height: 100%;
      }
    </style>
    <link href="./katex/katex.min.css" rel="stylesheet" />
    <link href="./index.css" rel="stylesheet" />
  </head>
  <body data-meo-mermaid-src="./mermaid.min.js">
    <div id="app" class="editor-root">
    </div>
    <script>
      // Mock acquireVsCodeApi
      const vscodeApi = {
        postMessage: (message) => {
          console.log("[MEO -> Host]", message);
          window.parent.postMessage({ type: "vsix-message", message }, "*");
        },
        getState: () => { return null; },
        setState: (state) => { }
      };
      window.acquireVsCodeApi = () => vscodeApi;
      
      // Listen to host messages
      window.addEventListener("message", (event) => {
        const message = event.data;
        if (message && message.type === "host-message") {
           console.log("[Host -> MEO]", message.payload);
           window.postMessage(message.payload, "*"); 
           // MEO webview components listen to `message` events on window.
        }
      });
    </script>
    <script type="module" src="./index.js"></script>
  </body>
</html>
